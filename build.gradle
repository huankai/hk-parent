/*
 * This file was generated by the Gradle 'init' task.
 */

plugins {
    id 'java'
    id "io.spring.dependency-management" version '1.0.12.RELEASE'
    id 'maven-publish'
}
//apply from: 'version.gradle'
repositories {
    mavenLocal()
    maven {
        url = uri('https://repo.maven.apache.org/maven2/')
    }
}

group = 'com.hk'
version = '2.7.5'
description = 'hk-parent'
java.sourceCompatibility = JavaVersion.VERSION_17

java {
    withSourcesJar()
}

properties {

}
dependencyManagement {
    imports {
        mavenBom "org.springframework.cloud:spring-cloud-dependencies:2021.0.3"
    }
    dependencies {
        dependency("org.springframework.boot:spring-boot-starter:2.7.5") {
            //排除指定的依赖
            exclude 'org.springframework.boot:spring-boot-starter-logging'
        }
        dependency("org.springframework.boot:spring-boot-starter-web:2.7.5") {
            exclude 'org.springframework.boot:spring-boot-starter-tomcat'
        }
        dependency("org.springframework.boot:spring-boot-starter-websocket:2.7.5") {
            exclude 'org.springframework.boot:spring-boot-starter-tomcat'
        }
    }
}

publishing {
    publications {
        maven(MavenPublication) {
            from(components.java)
        }
    }
}

tasks.withType(JavaCompile) {
    options.encoding = 'UTF-8'
}
